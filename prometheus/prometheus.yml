global:
  scrape_interval: 15s # By default, scrape targets every 15 seconds.
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'local_workers'
    static_configs:
      # host.docker.internal resolves to the host machine's localhost from within the Docker container
      # This allows scraping the local Python worker running outside of Docker on port 8000
      - targets: ['host.docker.internal:8000']
        labels:
          worker_type: 'background_dispatcher'
