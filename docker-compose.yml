
services:
  traefik:
    image: traefik@sha256:c549d482c55d7a797398562064f35428cc53e748d84d7190997930e7b31bcc32
    container_name: fhirbridge_traefik
    command:
      - "--api.dashboard=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/traefik/certs:ro
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped
    # TRADE-OFF: Traefik spans multiple segments as controlled edge router.
    # This is accepted to route exposed services across isolated zones.
    networks:
      dmz:
        aliases:
          - dashboard.docker.localhost
          - keycloak.docker.localhost
          - grafana.docker.localhost
      auth:
      observability:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fhirbridge_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    # DEV-ONLY: Um lokalen Zugriff (pgAdmin, DBeaver etc.) zu ermoeglichen,
    # temporaer 'ports' statt 'expose' verwenden. Produktion MUSS 'expose' nutzen.
    expose:
      - "5672"
      - "15672"
      - "15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline

  postgres:
    image: postgres:16-alpine
    container_name: fhirbridge_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fhirbridge}
    # DEV-ONLY: Um lokalen Zugriff (pgAdmin, DBeaver etc.) zu ermoeglichen,
    # temporaer 'ports' statt 'expose' verwenden. Produktion MUSS 'expose' nutzen.
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./certs/pg-server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/pg-server.key:/var/lib/postgresql/server.key:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        cp /var/lib/postgresql/server.crt /tmp/pg-server.crt
        cp /var/lib/postgresql/server.key /tmp/pg-server.key
        chown postgres:postgres /tmp/pg-server.crt /tmp/pg-server.key
        chmod 644 /tmp/pg-server.crt
        chmod 600 /tmp/pg-server.key
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/tmp/pg-server.crt \
          -c ssl_key_file=/tmp/pg-server.key
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-fhirbridge}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline

  ingestion-gateway:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: fhirbridge_ingestion
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - INTERNAL_AUTH_CONTEXT_SECRET=${INTERNAL_AUTH_CONTEXT_SECRET:?INTERNAL_AUTH_CONTEXT_SECRET is required}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-https://keycloak.docker.localhost}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-FhirBridgeAI}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-fhirbridge-api}
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-https://keycloak.docker.localhost/realms/FhirBridgeAI/protocol/openid-connect/certs}
      - MINIO_URL=https://minio.docker.localhost:9000
      - MINIO_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_EVIDENCE_BUCKET=${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      - MINIO_PROCESSING_BUCKET=${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      - MINIO_PHI_VAULT_BUCKET=${MINIO_PHI_VAULT_BUCKET:-phi-vault}
      - MINIO_EVIDENCE_RETENTION_DAYS=${MINIO_EVIDENCE_RETENTION_DAYS:-30}
    depends_on:
      rabbitmq:
        condition: service_healthy
    expose:
      - "8443"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: always
    user: "0:0"
    volumes:
      - ./certs/local-cert.pem:/etc/fhirbridge/source/tls.crt:ro
      - ./certs/local-key.pem:/etc/fhirbridge/source/tls.key:ro
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    command:
      - /bin/sh
      - -ec
      - |
        cp /etc/fhirbridge/source/tls.crt /tmp/ingestion-tls.crt
        cp /etc/fhirbridge/source/tls.key /tmp/ingestion-tls.key
        chown appuser:appuser /tmp/ingestion-tls.crt /tmp/ingestion-tls.key
        chmod 644 /tmp/ingestion-tls.crt
        chmod 600 /tmp/ingestion-tls.key
        exec su -s /bin/sh appuser -c "uvicorn fhirbridge.ingestion.api:app --host 0.0.0.0 --port 8443 --ssl-certfile /tmp/ingestion-tls.crt --ssl-keyfile /tmp/ingestion-tls.key"
    networks:
      dmz:
        aliases:
          - ingestion.docker.localhost
      pipeline: {}
      frontend_api:
        aliases:
          - ingestion-api.docker.localhost

  ocr-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fhirbridge_ocr_worker
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_AUTH_CONTEXT_SECRET=${INTERNAL_AUTH_CONTEXT_SECRET:?INTERNAL_AUTH_CONTEXT_SECRET is required}
      - MINIO_URL=https://minio.docker.localhost:9000
      - MINIO_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_EVIDENCE_BUCKET=${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      - MINIO_PROCESSING_BUCKET=${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      - MINIO_PHI_VAULT_BUCKET=${MINIO_PHI_VAULT_BUCKET:-phi-vault}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: always
    volumes:
      - ./src:/app/src
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    command: [ "python", "-m", "src.fhirbridge.workers.ocr_worker" ]
    networks:
      - pipeline

  llm-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fhirbridge_llm_worker
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - INTERNAL_AUTH_CONTEXT_SECRET=${INTERNAL_AUTH_CONTEXT_SECRET:?INTERNAL_AUTH_CONTEXT_SECRET is required}
      - MINIO_URL=https://minio.docker.localhost:9000
      - MINIO_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_EVIDENCE_BUCKET=${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      - MINIO_PROCESSING_BUCKET=${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      - MINIO_PHI_VAULT_BUCKET=${MINIO_PHI_VAULT_BUCKET:-phi-vault}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    restart: always
    volumes:
      - ./src:/app/src
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    command: [ "python", "-m", "src.fhirbridge.workers.llm_worker" ]
    networks:
      - pipeline

  fhir-export-worker:
    build:
      context: .
      dockerfile: Dockerfile.export
    container_name: fhirbridge_fhir_export_worker
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - FHIR_SERVER_URL=${FHIR_SERVER_URL:?FHIR_SERVER_URL is required}
      - FHIR_SERVER_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
      - FHIR_AUTH_BEARER=${FHIR_AUTH_BEARER:?FHIR_AUTH_BEARER is required}
      - INTERNAL_AUTH_CONTEXT_SECRET=${INTERNAL_AUTH_CONTEXT_SECRET:?INTERNAL_AUTH_CONTEXT_SECRET is required}
      - MINIO_URL=https://minio.docker.localhost:9000
      - MINIO_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_EVIDENCE_BUCKET=${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      - MINIO_PROCESSING_BUCKET=${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      - MINIO_PHI_VAULT_BUCKET=${MINIO_PHI_VAULT_BUCKET:-phi-vault}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: always
    volumes:
      - ./src:/app/src
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    networks:
      - pipeline

  outbox-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fhirbridge_outbox_dispatcher
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_AUTH_CONTEXT_SECRET=${INTERNAL_AUTH_CONTEXT_SECRET:?INTERNAL_AUTH_CONTEXT_SECRET is required}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    volumes:
      - ./src:/app/src
    command: [ "python", "-m", "src.fhirbridge.workers.outbox_dispatcher" ]
    networks:
      - pipeline

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fhirbridge_prometheus
    # DEV-ONLY: Um lokalen Zugriff (pgAdmin, DBeaver etc.) zu ermoeglichen,
    # temporaer 'ports' statt 'expose' verwenden. Produktion MUSS 'expose' nutzen.
    expose:
      - "9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - observability
      - pipeline
      - metrics_read

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: fhirbridge_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    expose:
      - "16686"
      - "4317"
    restart: unless-stopped
    networks:
      - observability
      - pipeline

  grafana:
    image: grafana/grafana:10.4.0
    container_name: fhirbridge_grafana
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=grafana-db:5432
      - GF_DATABASE_NAME=${GRAFANA_DB_NAME}
      - GF_DATABASE_USER=${GRAFANA_DB_USER}
      - GF_DATABASE_PASSWORD=${GRAFANA_DB_PASSWORD}
      - GF_DATABASE_SSL_MODE=disable
    depends_on:
      prometheus:
        condition: service_started
      grafana-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

  grafana-db:
    image: postgres:16-alpine
    container_name: fhirbridge_grafana_db
    environment:
      POSTGRES_USER: ${GRAFANA_DB_USER}
      POSTGRES_PASSWORD: ${GRAFANA_DB_PASSWORD}
      POSTGRES_DB: ${GRAFANA_DB_NAME}
    volumes:
      - grafana_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  keycloak-db:
    image: postgres:16-alpine
    container_name: fhirbridge_keycloak_db
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth

  keycloak:
    image: quay.io/keycloak/keycloak@sha256:a7b0cb7a43a1235a61872883414d3f1d9a3ceac9df6e5907bd12202778a6265c
    container_name: fhirbridge_keycloak
    # TRADE-OFF: start-dev in Dev-Umgebung akzeptiert, siehe ADR-015.
    # Produktion MUSS start --optimized verwenden.
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: keycloak.docker.localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./deploy/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - auth

  keycloak-bootstrap:
    image: quay.io/keycloak/keycloak@sha256:a7b0cb7a43a1235a61872883414d3f1d9a3ceac9df6e5907bd12202778a6265c
    container_name: fhirbridge_keycloak_bootstrap
    entrypoint: ["/bin/bash", "-c", "tr -d '\\r' < /opt/keycloak/bootstrap.sh | /bin/bash"]
    environment:
      KEYCLOAK_BOOTSTRAP_URL: https://keycloak.docker.localhost
      KEYCLOAK_REALM: FhirBridgeAI
      KEYCLOAK_OIDC_CLIENT_ID: streamlit-dashboard
      KEYCLOAK_BOOTSTRAP_CA_CERT_PATH: /etc/ssl/certs/local-ca.pem
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      KEYCLOAK_BOOTSTRAP_AUDITOR_USER: ${KEYCLOAK_BOOTSTRAP_AUDITOR_USER:-}
      KEYCLOAK_BOOTSTRAP_AUDITOR_PASSWORD: ${KEYCLOAK_BOOTSTRAP_AUDITOR_PASSWORD:-}
      KEYCLOAK_BOOTSTRAP_AUDITOR_EMAIL: ${KEYCLOAK_BOOTSTRAP_AUDITOR_EMAIL:-}
      KEYCLOAK_BOOTSTRAP_VIEWER_USER: ${KEYCLOAK_BOOTSTRAP_VIEWER_USER:-}
      KEYCLOAK_BOOTSTRAP_VIEWER_PASSWORD: ${KEYCLOAK_BOOTSTRAP_VIEWER_PASSWORD:-}
      KEYCLOAK_BOOTSTRAP_VIEWER_EMAIL: ${KEYCLOAK_BOOTSTRAP_VIEWER_EMAIL:-}
    volumes:
      - ./deploy/keycloak/bootstrap.sh:/opt/keycloak/bootstrap.sh:ro
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    depends_on:
      keycloak:
        condition: service_healthy
      traefik:
        condition: service_started
    restart: "no"
    networks:
      - dmz
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: fhirbridge_oauth2_proxy
    command: --config /etc/oauth2-proxy.cfg
    environment:
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY: ${OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY:-false}
    volumes:
      - ./deploy/oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    depends_on:
      keycloak:
        condition: service_healthy
      dashboard:
        condition: service_started
    restart: always
    networks:
      - dmz
      - auth
      - frontend

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fhirbridge_dashboard
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - DASHBOARD_REQUIRED_PROXY_HEADER=X-Auth-Request-User
      - DASHBOARD_API_BASE_URL=https://ingestion-api.docker.localhost:8443
      - DASHBOARD_API_CA_BUNDLE_PATH=/etc/ssl/certs/local-ca.pem
    depends_on:
      prometheus:
        condition: service_started
      ingestion-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    volumes:
      - ./certs/rootCA.pem:/etc/ssl/certs/local-ca.pem:ro
    networks:
      - frontend
      - metrics_read
      - frontend_api
