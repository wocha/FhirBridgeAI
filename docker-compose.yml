  # -----------------------------------------------------------------------
  # Ephemeral Synthetic Data Generator
  # Runs only when explicit profile is provided: 
  # docker compose --profile testdata up synthea-generator
  # -----------------------------------------------------------------------
  synthea-generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: fhirbridge_synthea_generator
    profiles:
      - testdata
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fhirbridge}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: "no"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.agents:/app/.agents

  minio:
    image: minio/minio:RELEASE.2024-03-07T00-43-48Z
    container_name: fhirbridge_minio
    profiles:
      - archive
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  minio-createbuckets:
    image: minio/mc:latest
    container_name: fhirbridge_minio_createbuckets
    profiles:
      - archive
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c " sleep 5; /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-admin} $${MINIO_ROOT_PASSWORD:-admin123}; /usr/bin/mc mb myminio/synthetic-archive --ignore-existing; /usr/bin/mc anonymous set private myminio/synthetic-archive; exit 0; "

volumes:
  rabbitmq_data:
  postgres_data:
  ollama_data: # vllm_model_cache:  # Uncomment with vLLM service above
  minio_data:
