  # -----------------------------------------------------------------------
  # Ephemeral Synthetic Data Generator
  # Runs only when explicit profile is provided:
  # docker compose --profile testdata up synthea-generator
  # -----------------------------------------------------------------------
  synthea-generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: fhirbridge_synthea_generator
    profiles:
      - testdata
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fhirbridge}?sslmode=require
      - RABBITMQ_URL=${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: "no"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.agents:/app/.agents
    networks:
      - pipeline

  minio:
    image: minio/minio:RELEASE.2024-03-07T00-43-48Z
    container_name: fhirbridge_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      MINIO_PROCESSING_BUCKET: ${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      MINIO_PHI_VAULT_BUCKET: ${MINIO_PHI_VAULT_BUCKET:-phi-vault}
    command: server /data --console-address ":9001"
    # DEV-ONLY: Um lokalen Zugriff (pgAdmin, DBeaver etc.) zu ermoeglichen,
    # temporaer 'ports' statt 'expose' verwenden. Produktion MUSS 'expose' nutzen.
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
      - ./certs/local-cert.pem:/root/.minio/certs/public.crt:ro
      - ./certs/local-key.pem:/root/.minio/certs/private.key:ro
    restart: always
    networks:
      pipeline:
        aliases:
          - minio.docker.localhost

  minio-createbuckets:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    container_name: fhirbridge_minio_createbuckets
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-evidence-originals}
      MINIO_PROCESSING_BUCKET: ${MINIO_PROCESSING_BUCKET:-processing-artifacts}
      MINIO_PHI_VAULT_BUCKET: ${MINIO_PHI_VAULT_BUCKET:-phi-vault}
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./certs/rootCA.pem:/root/.mc/certs/CAs/rootCA.crt:ro
    entrypoint: >
      /bin/sh -c " sleep 5; /usr/bin/mc alias set myminio https://minio.docker.localhost:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/$${MINIO_EVIDENCE_BUCKET} --with-lock --ignore-existing; /usr/bin/mc anonymous set private myminio/$${MINIO_EVIDENCE_BUCKET}; /usr/bin/mc mb myminio/$${MINIO_PROCESSING_BUCKET} --ignore-existing; /usr/bin/mc anonymous set private myminio/$${MINIO_PROCESSING_BUCKET}; /usr/bin/mc mb myminio/$${MINIO_PHI_VAULT_BUCKET} --ignore-existing; /usr/bin/mc anonymous set private myminio/$${MINIO_PHI_VAULT_BUCKET}; /usr/bin/mc mb myminio/synthetic-archive --ignore-existing; /usr/bin/mc anonymous set private myminio/synthetic-archive; exit 0; "
    networks:
      - pipeline
volumes:
  rabbitmq_data:
  postgres_data:
  grafana_db_data:
  keycloak_db_data:
  ollama_data: # vllm_model_cache:  # Uncomment with vLLM service above
  minio_data:

networks:
  dmz: # Traefik <-> externally exposed services
  auth: # Keycloak <-> OAuth2-Proxy <-> Keycloak-DB (isolated)
  frontend: # OAuth2-Proxy <-> Dashboard (isolated auth-protected UI segment)
  frontend_api: # Dashboard <-> ingestion read-model API (token-protected, no DB creds in frontend)
  pipeline: # Workers <-> RabbitMQ <-> Postgres <-> MinIO
  observability: # Prometheus <-> Grafana <-> Jaeger <-> Grafana-DB
  metrics_read: # Dashboard <-> Prometheus read-only metrics path












