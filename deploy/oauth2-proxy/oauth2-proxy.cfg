provider = "keycloak-oidc"
client_id = "streamlit-dashboard"

# OIDC issuer MUST match Keycloak token iss claim.
oidc_issuer_url = "https://keycloak.docker.localhost/realms/FhirBridgeAI"
skip_oidc_discovery = true
oidc_audience_claims = ["aud", "azp"]
insecure_oidc_allow_unverified_email = false

# Secure default: strict TLS verification. Dev override is controlled via
# OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY=true in non-production only.
ssl_insecure_skip_verify = false
provider_ca_files = ["/etc/ssl/certs/local-ca.pem"]

# Explicit HTTPS endpoints; no internal HTTP OIDC transport.
login_url = "https://keycloak.docker.localhost/realms/FhirBridgeAI/protocol/openid-connect/auth"
redeem_url = "https://keycloak.docker.localhost/realms/FhirBridgeAI/protocol/openid-connect/token"
profile_url = "https://keycloak.docker.localhost/realms/FhirBridgeAI/protocol/openid-connect/userinfo"
oidc_jwks_url = "https://keycloak.docker.localhost/realms/FhirBridgeAI/protocol/openid-connect/certs"
redirect_url = "https://dashboard.docker.localhost/oauth2/callback"

upstreams = [
    "http://dashboard:8501"
]

email_domains = [
    "*"
]

cookie_secure = true
cookie_domains = [".docker.localhost"]
cookie_samesite = "lax"

http_address = "0.0.0.0:4180"
reverse_proxy = true

pass_user_headers = true
pass_access_token = true
pass_authorization_header = true
set_xauthrequest = true
skip_auth_strip_headers = true
